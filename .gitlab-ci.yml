stages:
  - test
  - build

test:
  stage: test
  image: rust:latest
  script:
    - rustup component add rustfmt clippy
    - cargo fmt --all -- --check
    - cargo clippy --all-targets -- -D warnings
    - cargo test --locked

build:
  stage: build
  image: rust:latest
  script:
    - cargo build --release --locked
  artifacts:
    paths:
      - target/release/alea
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
