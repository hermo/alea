name: Release

on:
  push:
    tags: ['v*.*.*']

permissions: {}

jobs:
  create-release:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - run: |
          gh release create "${{ github.ref_name }}" \
            --draft \
            --generate-notes \
            --title "${{ github.ref_name }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: create-release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - run: |
          rustup toolchain install stable --profile minimal
          rustup target add ${{ matrix.target }}

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Verify version matches tag
        run: |
          TAG_VERSION="${{ github.ref_name }}"
          TAG_VERSION="${TAG_VERSION#v}"
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | cut -d'"' -f2)
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "error: tag ${{ github.ref_name }} does not match Cargo.toml version ${CARGO_VERSION}"
            echo "Run: ./release.sh ${{ github.ref_name }}"
            exit 1
          fi

      - name: Build
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev
          fi
          cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          ARCHIVE="alea-${{ matrix.target }}.tar.gz"
          mkdir "alea-${VERSION}"
          cp "target/${{ matrix.target }}/release/alea" "alea-${VERSION}/"
          tar czf "${ARCHIVE}" "alea-${VERSION}"
          if command -v sha256sum &>/dev/null; then
            sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"
          else
            shasum -a 256 "${ARCHIVE}" > "${ARCHIVE}.sha256"
          fi

      - name: Upload
        run: |
          gh release upload "${{ github.ref_name }}" \
            "alea-${{ matrix.target }}.tar.gz" \
            "alea-${{ matrix.target }}.tar.gz.sha256" \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-release:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - run: gh release edit "${{ github.ref_name }}" --draft=false --latest --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  homebrew:
    needs: publish-release
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          MAC_URL="https://github.com/hermo/alea/releases/download/${TAG}/alea-aarch64-apple-darwin.tar.gz"
          LINUX_URL="https://github.com/hermo/alea/releases/download/${TAG}/alea-x86_64-unknown-linux-gnu.tar.gz"
          MAC_SHA=$(curl -sL "$MAC_URL" | sha256sum | cut -d' ' -f1)
          LINUX_SHA=$(curl -sL "$LINUX_URL" | sha256sum | cut -d' ' -f1)

          FORMULA=$(cat <<EOF
          class Alea < Formula
            desc "Verifiable random selection using drand public randomness"
            homepage "https://github.com/hermo/alea"
            version "${VERSION}"
            license "GPL-2.0-only"

            on_macos do
              on_arm do
                url "${MAC_URL}"
                sha256 "${MAC_SHA}"
              end
            end

            on_linux do
              on_intel do
                url "${LINUX_URL}"
                sha256 "${LINUX_SHA}"
              end
            end

            def install
              bin.install "alea"
            end

            test do
              assert_match "at least 2 options required", shell_output("#{bin}/alea 2>&1", 2)
            end
          end
          EOF
          )

          # Push updated formula to tap repo
          gh api repos/hermo/homebrew-tap/contents/Formula/alea.rb \
            --method PUT \
            --field message="alea ${VERSION}" \
            --field content="$(echo "$FORMULA" | base64 -w0)" \
            --field sha="$(gh api repos/hermo/homebrew-tap/contents/Formula/alea.rb --jq .sha)"
